<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>M&A Shortcuts</title>

<!-- PWA -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#2C5F2E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="M&A Shortcuts">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="description" content="Révisez vos raccourcis clavier Excel, PowerPoint, Windows et Web">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F0E8;--bg2:#EDE8DC;--surface:#FDFAF4;
  --border:#DDD5C0;--border2:#C8BFA8;
  --green:#2C5F2E;--green2:#3A7A3D;--green3:#4E9E52;
  --green-pale:#E8F2E8;--green-light:#C5DFC6;
  --beige3:#D4C9B0;--text:#1C2B1D;--text2:#3D4F3E;--text3:#6B7D6C;--text4:#9AA89B;
  --excel:#1D5FA8;--ppt:#B83232;--win:#2C5F2E;--web:#6B21A8;
  --mastered:#22863a;--mastered-bg:#e6f4ea;--mastered-border:#a8d5b5;
  --learning:#b45309;--learning-bg:#fef3e2;--learning-border:#f0c070;
  --unknown:#b91c1c;--unknown-bg:#fde8e8;--unknown-border:#f0a0a0;
}
body.dark{
  --bg:#0F1410;--bg2:#161D14;--surface:#1A2318;
  --border:#2A3828;--border2:#3A4E36;
  --green:#3A7A3D;--green2:#4E9E52;--green3:#6BBF6E;
  --green-pale:#1A2E1A;--green-light:#2A4A2A;
  --beige3:#3A4E36;--text:#E8F0E0;--text2:#B8CEB0;--text3:#7A9870;--text4:#4A6840;
  --mastered:#4CAF72;--mastered-bg:#0D2018;--mastered-border:#2A5A38;
  --learning:#D4924C;--learning-bg:#201408;--learning-border:#6A4418;
  --unknown:#E05050;--unknown-bg:#200808;--unknown-border:#6A1818;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}
/* DARK MODE TOGGLE */
.dark-toggle{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:5px 12px;cursor:pointer;font-size:12px;color:rgba(245,240,232,0.8);font-family:'Plus Jakarta Sans',sans-serif;display:flex;align-items:center;gap:6px;transition:all .2s;white-space:nowrap}
.dark-toggle:hover{background:rgba(255,255,255,0.2)}
.dark-toggle .toggle-icon{font-size:14px}

/* HEADER */
.header{background:var(--green);padding:1.25rem 2.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:16px}
.logo-icon{width:44px;height:44px;border-radius:10px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;font-size:20px}
.logo-title{font-size:18px;font-weight:700;color:#F5F0E8;font-family:'Plus Jakarta Sans',sans-serif}
.logo-sub{font-size:11px;color:rgba(245,240,232,0.6);margin-top:2px;letter-spacing:.08em;font-family:'Plus Jakarta Sans',sans-serif}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:10px}
.header-stats{display:flex;gap:20px;flex-wrap:wrap}
.hstat{text-align:right}
.hstat-n{font-size:20px;font-weight:700;color:#F5F0E8;line-height:1;font-family:'Plus Jakarta Sans',sans-serif}
.hstat-n.green{color:#86efac}
.hstat-n.yellow{color:#fde68a}
.hstat-n.red{color:#fca5a5}
.hstat-l{font-size:10px;color:rgba(245,240,232,0.55);text-transform:uppercase;letter-spacing:.08em;margin-top:2px;font-family:'Plus Jakarta Sans',sans-serif}
/* PROGRESS BAR IN HEADER */
.header-progress{width:260px;max-width:100%}
.hprog-label{display:flex;justify-content:space-between;margin-bottom:5px}
.hprog-label span{font-size:11px;color:rgba(245,240,232,0.7);font-family:'Plus Jakarta Sans',sans-serif}
.hprog-label strong{font-size:11px;color:#86efac;font-family:'Plus Jakarta Sans',sans-serif}
.hprog-track{height:7px;background:rgba(255,255,255,0.15);border-radius:4px;overflow:hidden}
.hprog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#86efac,#4ade80);transition:width .6s cubic-bezier(.4,0,.2,1)}
.hprog-segments{display:flex;gap:3px;margin-top:4px}
.hprog-seg{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,0.12);transition:background .3s}
.hprog-seg.mastered{background:#86efac}
.hprog-seg.learning{background:#fde68a}
.hprog-seg.unknown{background:#fca5a5}

/* NAV */
.nav{background:var(--green2);padding:0 2.5rem;display:flex;overflow-x:auto}
.nav-tab{padding:13px 22px;font-size:13px;font-weight:400;color:rgba(245,240,232,0.6);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;font-family:'Plus Jakarta Sans',sans-serif}
.nav-tab:hover{color:#F5F0E8}
.nav-tab.active{color:#F5F0E8;border-bottom-color:var(--beige3)}

/* MAIN */
.main{padding:2rem 2.5rem;max-width:1100px;margin:0 auto}


/* PROGRESS BANNER (in fiches tab) */
.prog-banner{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.25rem 1.5rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap}
.prog-ring-wrap{flex-shrink:0}
.prog-ring{width:72px;height:72px;position:relative}
.prog-ring svg{transform:rotate(-90deg)}
.prog-ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:var(--green);font-family:'Plus Jakarta Sans',sans-serif}
.prog-details{flex:1;min-width:180px}
.prog-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px;font-family:'Plus Jakarta Sans',sans-serif}
.prog-bars{display:flex;flex-direction:column;gap:6px}
.prog-bar-row{display:flex;align-items:center;gap:8px}
.prog-bar-label{font-size:11px;color:var(--text3);font-family:'Plus Jakarta Sans',sans-serif;width:80px;flex-shrink:0}
.prog-bar-track{flex:1;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}
.prog-bar-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.prog-bar-fill.mastered{background:var(--mastered)}
.prog-bar-fill.learning{background:var(--learning)}
.prog-bar-fill.unknown{background:var(--unknown)}
.prog-bar-fill.unset{background:var(--border2)}
.prog-bar-count{font-size:11px;color:var(--text4);font-family:'Plus Jakarta Sans',sans-serif;width:28px;text-align:right;flex-shrink:0}
.prog-message{font-size:12px;color:var(--text3);margin-top:10px;font-family:'Plus Jakarta Sans',sans-serif;font-style:italic}

/* SPACED REP BADGE */
.sr-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:10px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;background:rgba(180,83,9,.1);color:var(--learning);border:1px solid var(--learning-border);margin-left:6px}

.stitle{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);margin-bottom:1.25rem;display:flex;align-items:center;gap:12px;font-family:'Plus Jakarta Sans',sans-serif}
.stitle::after{content:'';flex:1;height:1px;background:var(--border)}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:1rem}
.search-input{width:100%;padding:10px 40px;border-radius:24px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;transition:border .2s;outline:none}
.search-input:focus{border-color:var(--green2);box-shadow:0 0 0 3px rgba(44,95,46,.08)}
.search-input::placeholder{color:var(--text4)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text4);font-size:14px;pointer-events:none}
.search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text4);font-size:16px;padding:2px 6px;border-radius:50%;line-height:1;display:none}
.search-clear.show{display:block}
.search-clear:hover{color:var(--text2)}
.search-count{font-size:11px;color:var(--text4);font-family:'Plus Jakarta Sans',sans-serif;margin-bottom:.75rem}

/* FILTERS */
.filter-bar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.filter-btn{padding:6px 18px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-size:12px;font-weight:500;transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif}
.filter-btn:hover{border-color:var(--green2);color:var(--green)}
.fb-all.on{background:var(--green);border-color:var(--green);color:#F5F0E8}
.fb-excel.on{background:rgba(29,95,168,.1);border-color:var(--excel);color:var(--excel)}
.fb-ppt.on{background:rgba(184,50,50,.1);border-color:var(--ppt);color:var(--ppt)}
.fb-win.on{background:var(--green-pale);border-color:var(--green3);color:var(--green)}
.fb-web.on{background:rgba(107,33,168,.1);border-color:#6B21A8;color:#6B21A8}
.fb-fav.on{background:rgba(234,179,8,.15);border-color:#CA8A04;color:#92400E}
.star-btn{background:none;border:none;cursor:pointer;font-size:16px;padding:2px 4px;line-height:1;transition:transform .15s;-webkit-tap-highlight-color:transparent}
.star-btn:hover{transform:scale(1.3)}
.star-btn:active{transform:scale(0.9)}
.level-bar{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap}
.lbtn{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif;display:flex;align-items:center;gap:6px}
.lbtn:hover{border-color:var(--border2)}
.lbtn.on-mastered{background:var(--mastered-bg);border-color:var(--mastered-border);color:var(--mastered)}
.lbtn.on-learning{background:var(--learning-bg);border-color:var(--learning-border);color:var(--learning)}
.lbtn.on-unknown{background:var(--unknown-bg);border-color:var(--unknown-border);color:var(--unknown)}
.lbtn.on-unset{background:var(--bg2);border-color:var(--border2);color:var(--text2)}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dot-mastered{background:var(--mastered)}.dot-learning{background:var(--learning)}.dot-unknown{background:var(--unknown)}.dot-unset{background:var(--border2)}

/* CARDS */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px}
.card-wrap{height:195px;perspective:900px;cursor:pointer;position:relative}
.card-inner{position:relative;width:100%;height:100%;transition:transform .5s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d}
.card-wrap.flipped .card-inner{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;border-radius:12px;padding:1.2rem;backface-visibility:hidden;display:flex;flex-direction:column;justify-content:space-between;border:1px solid var(--border)}
.card-front{background:var(--surface);transition:all .2s}
.card-front:hover{border-color:var(--green3);box-shadow:0 4px 20px rgba(44,95,46,.1);transform:translateY(-2px)}
.card-front:active{transform:scale(0.98);opacity:.9}
.card-back{transform:rotateY(180deg);background:var(--green);border-color:var(--green);justify-content:center;align-items:center;text-align:center;gap:8px}
.card-wrap.lv-mastered .card-front{border-left:3px solid var(--mastered)}
.card-wrap.lv-learning .card-front{border-left:3px solid var(--learning)}
.card-wrap.lv-unknown .card-front{border-left:3px solid var(--unknown)}
.cat-bar{height:2px;border-radius:1px;margin-bottom:10px}
.cbar-excel{background:var(--excel)}.cbar-ppt{background:var(--ppt)}.cbar-win{background:var(--win)}.cbar-web{background:#6B21A8}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.card-top-left{display:flex;align-items:center;gap:6px;position:relative}
.cbadge{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;font-family:'Plus Jakarta Sans',sans-serif}
.cbx-excel{background:rgba(29,95,168,.1);color:var(--excel)}
.cbx-ppt{background:rgba(184,50,50,.1);color:var(--ppt)}
.cbx-win{background:var(--green-pale);color:var(--green)}
.cbx-web{background:rgba(107,33,168,.1);color:#6B21A8}
.lv-flag{width:22px;height:22px;border-radius:50%;cursor:pointer;flex-shrink:0;border:2px solid transparent;transition:transform .15s;-webkit-tap-highlight-color:transparent}
.lv-flag:hover{transform:scale(1.2)}
.lv-flag:active{transform:scale(0.95)}
.lv-flag.mastered{background:var(--mastered);border-color:var(--mastered)}
.lv-flag.learning{background:var(--learning);border-color:var(--learning)}
.lv-flag.unknown{background:var(--unknown);border-color:var(--unknown)}
.lv-flag.unset{background:#ddd;border-color:#ccc}
.lv-picker{position:absolute;top:28px;left:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:8px;display:flex;flex-direction:column;gap:4px;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.15);min-width:170px}
.lv-picker-opt{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--text2);border:none;background:transparent;width:100%;text-align:left}
.lv-picker-opt:hover,.lv-picker-opt:active{background:var(--bg2)}
.lv-picker-opt .dot{width:12px;height:12px}
.lv-sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.lv-sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:1.25rem 1.25rem 2rem;width:100%;max-width:480px;box-shadow:0 -4px 32px rgba(0,0,0,.15)}
.lv-sheet-handle{width:40px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 1.25rem}
.lv-sheet-title{font-size:13px;font-weight:600;color:var(--text3);text-align:center;margin-bottom:1rem;font-family:'Plus Jakarta Sans',sans-serif;text-transform:uppercase;letter-spacing:.06em}
.lv-sheet-opts{display:flex;flex-direction:column;gap:8px}
.lv-sheet-opt{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:12px;cursor:pointer;font-size:15px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);border:1.5px solid var(--border);background:var(--bg)}
.lv-sheet-opt:active{transform:scale(0.98)}
.lv-sheet-opt.opt-mastered{border-color:var(--mastered-border);background:var(--mastered-bg);color:var(--mastered)}
.lv-sheet-opt.opt-learning{border-color:var(--learning-border);background:var(--learning-bg);color:var(--learning)}
.lv-sheet-opt.opt-unknown{border-color:var(--unknown-border);background:var(--unknown-bg);color:var(--unknown)}
.lv-sheet-opt .dot{width:14px;height:14px;flex-shrink:0}
.card-shortcut{font-size:15px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--text);line-height:1.4}
.card-hint{font-size:11px;color:var(--text3);margin-top:3px;line-height:1.4;font-family:'Plus Jakarta Sans',sans-serif}
.card-flip-hint{font-size:10px;color:var(--text4);text-align:right;font-family:'Plus Jakarta Sans',sans-serif}
.card-back-action{font-size:13px;font-weight:600;color:#F5F0E8;line-height:1.5;padding:0 .5rem;font-family:'Plus Jakarta Sans',sans-serif}
.card-back-short{font-size:11px;color:rgba(245,240,232,0.65);font-family:'JetBrains Mono',monospace;margin-top:5px}

/* SLIDE */
.big-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;min-height:300px;padding:2.25rem;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;transition:all .25s}
.big-card.flipped{background:var(--green);border-color:var(--green)}
.big-shortcut{font-size:28px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--text);line-height:1.3;margin:1rem 0}
.big-hint{font-size:13px;color:var(--text3);line-height:1.5;font-family:'Plus Jakarta Sans',sans-serif}
.big-action{font-size:20px;font-weight:600;color:#F5F0E8;line-height:1.5;text-align:center;padding:0 1rem;font-family:'Plus Jakarta Sans',sans-serif}
.big-sub{font-size:12px;color:rgba(245,240,232,0.6);font-family:'JetBrains Mono',monospace;margin-top:.75rem;text-align:center}
.flip-zone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.flip-tip{font-size:11px;color:var(--text4);margin-top:1rem;font-family:'Plus Jakarta Sans',sans-serif}
.flip-tip-inv{font-size:11px;color:rgba(245,240,232,0.5);margin-top:1rem;font-family:'Plus Jakarta Sans',sans-serif}
.slide-nav{display:flex;align-items:center;justify-content:space-between;margin-top:1.25rem}
.snav-btn{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text2);cursor:pointer;padding:10px 24px;font-size:13px;font-weight:500;transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif}
.snav-btn:hover:not(:disabled){background:var(--green);border-color:var(--green);color:#F5F0E8}
.snav-btn:disabled{opacity:.3;cursor:default}
.slide-dots{display:flex;gap:7px;align-items:center}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:all .2s;cursor:pointer}
.sdot.on{background:var(--green);width:22px;border-radius:4px}
.slide-counter{font-size:13px;color:var(--text3);font-weight:500;font-family:'Plus Jakarta Sans',sans-serif}
.swipe-hint{display:none;align-items:center;justify-content:center;gap:6px;margin-top:.875rem;color:var(--text4);font-size:12px;font-family:'Plus Jakarta Sans',sans-serif}
.swipe-hint span{font-size:18px}
.kbd-hint{display:flex;gap:14px;justify-content:center;margin-top:1rem;flex-wrap:wrap}
.kbd-hint span{font-size:11px;color:var(--text4);font-family:'Plus Jakarta Sans',sans-serif}
.kbd{display:inline-block;padding:1px 8px;border-radius:4px;border:1px solid var(--border);background:var(--bg2);font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3)}
.slide-level-row{display:flex;gap:8px;justify-content:center;margin-top:1rem;flex-wrap:wrap}
.slbtn{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:12px;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;display:flex;align-items:center;gap:6px;transition:all .2s;color:var(--text3)}
.slbtn:hover{background:var(--bg2)}
.slbtn.active-mastered{background:var(--mastered-bg);border-color:var(--mastered-border);color:var(--mastered)}
.slbtn.active-learning{background:var(--learning-bg);border-color:var(--learning-border);color:var(--learning)}
.slbtn.active-unknown{background:var(--unknown-bg);border-color:var(--unknown-border);color:var(--unknown)}

/* QUIZ */
.quiz-mode-sel{display:flex;gap:12px;margin-bottom:1.5rem;flex-wrap:wrap}
.qmode-btn{flex:1;min-width:180px;padding:1.2rem 1.35rem;border-radius:12px;border:1px solid var(--border);background:var(--surface);cursor:pointer;text-align:left;transition:all .2s}
.qmode-btn:hover{border-color:var(--green2)}
.qmode-btn.selected{border-color:var(--green);background:var(--green-pale)}
.qmode-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px;font-family:'Plus Jakarta Sans',sans-serif}
.qmode-sub{font-size:11px;color:var(--text3);font-family:'Plus Jakarta Sans',sans-serif}
.progress-bar{height:3px;background:var(--border);border-radius:2px;margin-bottom:1.5rem;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .35s}
.quiz-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.75rem;margin-bottom:1rem}
.quiz-q{font-size:16px;font-weight:600;color:var(--text);margin-bottom:1.5rem;line-height:1.6;font-family:'Plus Jakarta Sans',sans-serif}
.quiz-q code{background:var(--bg2);padding:4px 12px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:15px;color:var(--green);border:1px solid var(--border)}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.qopt{padding:13px 16px;border-radius:10px;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:13px;color:var(--text2);text-align:left;line-height:1.4;transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif}
.qopt:hover:not(:disabled){border-color:var(--green2);background:var(--green-pale);color:var(--green)}
.qopt:disabled{cursor:default}
.qopt.correct{background:var(--mastered-bg);border-color:var(--mastered-border);color:var(--mastered)}
.qopt.wrong{background:var(--unknown-bg);border-color:var(--unknown-border);color:var(--unknown)}
.feedback{margin-top:1.25rem;padding:1rem 1.25rem;border-radius:10px;font-size:13px;line-height:1.6;font-family:'Plus Jakarta Sans',sans-serif}
.feedback.ok{background:var(--mastered-bg);border:1px solid var(--mastered-border);color:var(--mastered)}
.feedback.ko{background:var(--unknown-bg);border:1px solid var(--unknown-border);color:var(--unknown)}
.score-box{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:3rem 2rem;text-align:center}
.score-ring{width:140px;height:140px;border-radius:50%;background:var(--green);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 1.5rem;border:4px solid var(--green-light)}
.score-n{font-size:36px;font-weight:700;color:#F5F0E8;font-family:'Plus Jakarta Sans',sans-serif}
.score-d{font-size:12px;color:rgba(245,240,232,0.65);font-family:'Plus Jakarta Sans',sans-serif}
.score-pct{font-size:28px;font-weight:700;color:var(--green);margin-bottom:.5rem;font-family:'Plus Jakarta Sans',sans-serif}
.score-msg{font-size:14px;color:var(--text3);margin-bottom:2rem;font-family:'Plus Jakarta Sans',sans-serif}
.score-breakdown{display:flex;gap:16px;justify-content:center;margin-bottom:1.5rem;flex-wrap:wrap}
.score-bd-item{padding:8px 16px;border-radius:8px;font-size:12px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600}
.score-bd-item.ok{background:var(--mastered-bg);color:var(--mastered)}
.score-bd-item.ko{background:var(--unknown-bg);color:var(--unknown)}
.btn{padding:10px 22px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-weight:500;transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif}
.btn:hover{background:var(--bg2);color:var(--text)}
.btn.primary{background:var(--green);border-color:var(--green);color:#F5F0E8}
.btn.primary:hover{background:var(--green2)}
.brow{display:flex;gap:8px;flex-wrap:wrap}
.empty{padding:3rem 1rem;text-align:center;border:1px dashed var(--border2);border-radius:14px}
.empty-t{font-size:14px;font-weight:600;color:var(--text3);margin-bottom:6px;font-family:'Plus Jakarta Sans',sans-serif}
.empty-s{font-size:13px;color:var(--text4);font-family:'Plus Jakarta Sans',sans-serif}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.12);font-family:'Plus Jakarta Sans',sans-serif}
.toast.show{opacity:1}
.toast.ok{background:var(--green-pale);color:var(--green);border:1px solid var(--green-light)}
.toast.err{background:var(--unknown-bg);color:var(--unknown);border:1px solid var(--unknown-border)}
/* LOCK SCREEN */
#lock-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:1.5rem}
.lock-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:380px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.lock-icon{font-size:36px;margin-bottom:.75rem}
.lock-title{font-size:20px;font-weight:700;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;margin-bottom:.25rem}
.lock-sub{font-size:13px;color:var(--text3);font-family:'Plus Jakarta Sans',sans-serif;margin-bottom:1.5rem}
.lock-input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:15px;font-family:'JetBrains Mono',monospace;text-align:center;letter-spacing:.1em;outline:none;transition:border .2s}
.lock-input:focus{border-color:var(--green2);box-shadow:0 0 0 3px rgba(58,122,61,.1)}
.lock-input.error{border-color:var(--unknown);animation:shake .3s ease}
.lock-btn{width:100%;margin-top:1rem;padding:12px;border-radius:10px;border:none;background:var(--green);color:#F5F0E8;font-size:14px;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;transition:background .2s}
.lock-btn:hover{background:var(--green2)}
.lock-error{font-size:12px;color:var(--unknown);margin-top:.5rem;min-height:18px;font-family:'Plus Jakarta Sans',sans-serif}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.badges-bandeau{background:var(--bg2);border-bottom:1px solid var(--border);padding:.6rem 2.5rem;display:flex;align-items:center;gap:1.5rem}
.badges-bandeau-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text4);white-space:nowrap;font-family:'Plus Jakarta Sans',sans-serif}
.badges-bandeau-row{display:flex;gap:.5rem;align-items:center;flex:1;justify-content:space-between}
.bdg{display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;flex:1;cursor:default}
.bdg.unlocked{cursor:pointer}
.bdg svg{transition:transform .2s}
.bdg.locked svg{filter:grayscale(1) opacity(0.2)}
.bdg.unlocked:hover svg{transform:scale(1.15)}
.bdg-name{font-size:9px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--text4);text-align:center;white-space:nowrap}
.bdg.unlocked .bdg-name{color:var(--text3)}
.bdg-tip{display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:11px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);white-space:nowrap;z-index:50;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.bdg-tip strong{font-weight:600;display:block;margin-bottom:2px}
.bdg-tip small{color:var(--text3);font-size:10px}
.bdg:hover .bdg-tip{display:block}



/* MOBILE CURRENT BADGE */
.mobile-badge{
  display:none;
  align-items:center;
  gap:6px;
  position:relative;
}
.mobile-badge svg{cursor:pointer}
.mobile-badge-name{font-size:10px;color:rgba(245,240,232,0.7);font-family:'Plus Jakarta Sans',sans-serif;white-space:nowrap}

/* MOBILE BOTTOM NAV */
.mobile-nav{
  display:none;
  position:fixed;
  bottom:0;left:0;right:0;
  background:var(--green);
  padding:12px 0 max(16px, env(safe-area-inset-bottom));
  z-index:1000;
  border-top:2px solid rgba(255,255,255,0.12);
  box-shadow:0 -4px 24px rgba(0,0,0,.2);
}
.mob-tab{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;
  background:none;border:none;cursor:pointer;
  padding:6px 0;
  color:rgba(245,240,232,0.45);
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.mob-tab.active{color:#F5F0E8}
.mob-tab.active .mob-tab-icon{transform:scale(1.15)}
.mob-tab-icon{font-size:24px;line-height:1;transition:transform .15s}
.mob-tab-label{font-size:11px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;letter-spacing:.02em}

/* ── MOBILE ── */
@media(max-width:640px){

  /* Safe area pour iPhone (encoche/Dynamic Island) */
  body{padding-top:env(safe-area-inset-top)}
  .header{
    padding:.875rem max(1rem, env(safe-area-inset-left)) .875rem max(1rem, env(safe-area-inset-right));
    gap:.5rem;
  }

  /* HEADER simplifié */
  .logo-sub{display:none}
  .logo-icon{width:34px;height:34px;font-size:15px}

  .header-right{gap:4px}
  .header-stats{gap:10px}
  .hstat-n{font-size:15px}
  .hstat-l{font-size:8px}
  .dark-toggle span:last-child{display:none}
  .dark-toggle{padding:5px 8px}
  .header-progress{width:120px}
  .hprog-label span:first-child{display:none}
  .hprog-segs-wrap{display:none}

  /* NAV — cachée sur mobile, remplacée par menu sous logo */
  .nav{display:none}
  .mobile-nav{display:flex}

  /* BADGES — défile horizontalement */
  .badges-bandeau{
    padding:.5rem max(.75rem, env(safe-area-inset-left));
    gap:.5rem;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
    flex-wrap:nowrap;
  }
  .badges-bandeau::-webkit-scrollbar{display:none}
  .badges-bandeau-label{display:none}
  .badges-bandeau-row{flex-wrap:nowrap;justify-content:flex-start;gap:.875rem}
  .bdg{flex:0 0 auto}
  .bdg svg{width:40px;height:40px}
  .bdg-name{font-size:9px}

  /* MAIN avec marges safe area */
  .main{
    padding:1rem max(1rem, env(safe-area-inset-right)) 90px max(1rem, env(safe-area-inset-left));
  }

  /* FILTRES — défilent horizontalement */
  .filter-bar{
    flex-wrap:nowrap;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
    padding-bottom:4px;
    margin-bottom:.875rem;
  }
  .filter-bar::-webkit-scrollbar{display:none}
  .filter-btn{flex:0 0 auto;padding:6px 14px;font-size:12px}

  /* NIVEAUX — défilent horizontalement */
  .level-bar{
    flex-wrap:nowrap;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
    padding-bottom:4px;
    margin-bottom:1rem;
  }
  .level-bar::-webkit-scrollbar{display:none}
  .lbtn{flex:0 0 auto;padding:6px 12px;font-size:11px}

  /* CARDS */
  .cards-grid{grid-template-columns:1fr;gap:10px}
  .card-wrap{height:170px}
  .card-shortcut{font-size:15px}
  .card-hint{font-size:12px}
  .card-face{padding:1rem}

  /* SLIDE */
  .big-card{min-height:220px;padding:1.25rem}
  .big-shortcut{font-size:20px;margin:.75rem 0}
  .big-action{font-size:16px}
  .snav-btn{display:none}
  .slide-dots{justify-content:center}
  .swipe-hint{display:flex}
  .slide-level-row{gap:6px}
  .slbtn{padding:10px 16px;font-size:13px;flex:1;justify-content:center}
  .slide-level-row{gap:8px;margin-top:.875rem}
  .kbd-hint{display:none}

  /* QUIZ */
  .quiz-mode-sel{flex-direction:column;gap:8px}
  .qmode-btn{padding:1rem}
  .quiz-opts{grid-template-columns:1fr;gap:8px}
  .quiz-box{padding:1.25rem}

  .score-ring{width:110px;height:110px}
  .score-n{font-size:28px}
  .score-box{padding:2rem 1rem}
  .brow{justify-content:center}

  /* LOCK SCREEN */
  .lock-box{padding:2rem 1.25rem;margin:1rem;border-radius:16px}
  .lock-title{font-size:18px}

  /* FORM */
  .form-grid{grid-template-columns:1fr}
  .form-panel{padding:1.25rem}
}

</style>
</head>

<script>
const PASSWORD='doyouhavecapacity?';
function checkPassword(){
  const val=document.getElementById('lock-input').value;
  if(val===PASSWORD){
    document.getElementById('lock-screen').style.display='none';
    sessionStorage.setItem('ma_auth','1');
  } else {
    const inp=document.getElementById('lock-input');
    inp.classList.add('error');
    document.getElementById('lock-error').textContent='Mot de passe incorrect ❌';
    setTimeout(()=>{inp.classList.remove('error');inp.value='';},600);
  }
}
if(sessionStorage.getItem('ma_auth')==='1'){
  document.getElementById('lock-screen').style.display='none';
}
</script>

// ── SPACED REPETITION POOL ──
// Weight: unknown=5x, learning=2x, mastered=0.5x, unset=1x
function buildSRPool(basePool){
  const weights={unknown:5,learning:2,unset:1,mastered:0.5};
  let pool=[];
  basePool.forEach(d=>{
    const lv=getLevel(d.id);
    const extraWrong=Math.min(srWrong[d.id]||0,5); // up to 5 extra copies for repeat errors
    const w=Math.ceil((weights[lv]||1)+extraWrong);
    for(let i=0;i<w;i++)pool.push(d);
  });
  return shuffle(pool).slice(0,Math.min(12,pool.length));
  // deduplicate keeping order
}
function dedupePool(pool){
  const seen=new Set();
  return pool.filter(d=>{if(seen.has(d.id))return false;seen.add(d.id);return true;});
}

function filteredCards(f,lf,q){
  let cards=f==='all'?all():f==='fav'?all().filter(d=>favs.has(d.id)):all().filter(d=>d.cat===f);
  if(lf&&lf!=='all')cards=cards.filter(d=>getLevel(d.id)===lf);
  if(q){const ql=q.toLowerCase();cards=cards.filter(d=>d.shortcut.toLowerCase().includes(ql)||d.action.toLowerCase().includes(ql)||(d.hint&&d.hint.toLowerCase().includes(ql)));}
  return cards;
}

function launchConfetti(intensity=60){
  const colors=['#22863a','#4E9E52','#C9A84C','#F0C040','#B83232','#7C6FAB','#1D5FA8','#F5F0E8'];
  const container=document.createElement('div');
  container.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden';
  document.body.appendChild(container);
  for(let i=0;i<intensity;i++){
    const el=document.createElement('div');
    const size=Math.random()*8+4;
    const color=colors[Math.floor(Math.random()*colors.length)];
    const x=Math.random()*100;
    const delay=Math.random()*600;
    const dur=Math.random()*1200+800;
    const rot=Math.random()*360;
    const shape=Math.random()>.5?'50%':'2px';
    el.style.cssText=`
      position:absolute;width:${size}px;height:${size}px;
      background:${color};border-radius:${shape};
      left:${x}%;top:-10px;
      animation:confetti-fall ${dur}ms ${delay}ms ease-in forwards;
      transform:rotate(${rot}deg);
    `;
    container.appendChild(el);
  }
  const style=document.createElement('style');
  style.textContent=`
    @keyframes confetti-fall{
      0%{transform:translateY(0) rotate(0deg) scale(1);opacity:1}
      80%{opacity:1}
      100%{transform:translateY(100vh) rotate(${Math.random()*720}deg) scale(0.5);opacity:0}
    }
  `;
  document.head.appendChild(style);
  setTimeout(()=>{container.remove();style.remove();},2500);
}

function renderBadgesBandeau(){
  const pct=parseInt(document.getElementById('hprog-pct').textContent)||0;
  const row=document.getElementById('badges-bandeau-row');
  if(!row)return;
  const prevUnlocked=new Set(Array.from(row.querySelectorAll('.bdg.unlocked')).map(el=>el.dataset.id));
  row.innerHTML='';
  const mobileBadgeEl=document.getElementById('mobile-badge');
  if(mobileBadgeEl)mobileBadgeEl.innerHTML='';
  const ns='http://www.w3.org/2000/svg';
  BADGES_DEF.forEach(b=>{
    const unlocked=pct>=b.pct;
    const div=document.createElement('div');
    div.className='bdg '+(unlocked?'unlocked':'locked');
    div.dataset.id=b.id;
    const svg=document.createElementNS(ns,'svg');
    svg.setAttribute('width','48');svg.setAttribute('height','48');
    svg.setAttribute('viewBox','-38 -38 76 76');
    const hex=document.createElementNS(ns,'polygon');
    hex.setAttribute('points','0,-32 28,-16 28,16 0,32 -28,16 -28,-16');
    hex.setAttribute('fill',unlocked?b.color+'20':'transparent');
    hex.setAttribute('stroke',unlocked?b.color:'#C8BFA8');
    hex.setAttribute('stroke-width','1.8');
    svg.appendChild(hex);
    const g=document.createElementNS(ns,'g');
    b.draw(g,unlocked?b.color:'#C8BFA8');
    svg.appendChild(g);
    const tip=document.createElement('div');
    tip.className='bdg-tip';
    tip.innerHTML=`<strong>${b.name}</strong><small>${unlocked?'Débloqué ✓':b.desc+' requis'}</small>`;
    const name=document.createElement('div');
    name.className='bdg-name';
    name.textContent=b.name;
    div.appendChild(svg);div.appendChild(tip);div.appendChild(name);
    row.appendChild(div);
    // confetti si nouveau badge débloqué
    if(unlocked&&!prevUnlocked.has(b.id)&&prevUnlocked.size>0){
      setTimeout(()=>launchConfetti(80),100);
      showToast('🎉 Badge débloqué : '+b.name,'ok');
    }
  });
  // Mobile: show only current (highest unlocked) badge
  const mobileBadge2El=document.getElementById('mobile-badge');
  if(mobileBadge2El){
    const currentBadge=[...BADGES_DEF].reverse().find(b=>pct>=b.pct);
    if(currentBadge){
      const svg=document.createElementNS(ns,'svg');
      svg.setAttribute('width','36');svg.setAttribute('height','36');
      svg.setAttribute('viewBox','-38 -38 76 76');
      const hex=document.createElementNS(ns,'polygon');
      hex.setAttribute('points','0,-32 28,-16 28,16 0,32 -28,16 -28,-16');
      hex.setAttribute('fill',currentBadge.color+'30');
      hex.setAttribute('stroke',currentBadge.color);
      hex.setAttribute('stroke-width','2');
      svg.appendChild(hex);
      const g=document.createElementNS(ns,'g');
      currentBadge.draw(g,currentBadge.color);
      svg.appendChild(g);
      const name=document.createElement('span');
      name.className='mobile-badge-name';
      name.textContent=currentBadge.name;
      mobileBadge2El.appendChild(svg);
      mobileBadge2El.appendChild(name);
    }
  }
}

function updateStats(){
  const a=all();
  const nMastered=a.filter(d=>getLevel(d.id)==='mastered').length;
  const nLearning=a.filter(d=>getLevel(d.id)==='learning').length;
  const nUnknown=a.filter(d=>getLevel(d.id)==='unknown').length;
  const nUnset=a.length-nMastered-nLearning-nUnknown;
  const pct=Math.round(nMastered/a.length*100);
  document.getElementById('stat-total').textContent=a.length;
  document.getElementById('stat-mastered').textContent=nMastered;
  document.getElementById('stat-learning').textContent=nLearning;
  document.getElementById('stat-unknown').textContent=nUnknown;
  document.getElementById('hprog-pct').textContent=pct+'%';
  document.getElementById('hprog-fill').style.width=pct+'%';

  const segs=document.getElementById('hprog-segs');
  segs.innerHTML=a.map(d=>`<div class="hprog-seg ${getLevel(d.id)}"></div>`).join('');

}

    <button class="filter-btn fb-excel ${currentFilter==='excel'?'on':''}" onclick="setFilter('excel')">Excel (${cnt('excel')})</button>
    <button class="filter-btn fb-ppt ${currentFilter==='ppt'?'on':''}" onclick="setFilter('ppt')">PowerPoint (${cnt('ppt')})</button>
    <button class="filter-btn fb-win ${currentFilter==='win'?'on':''}" onclick="setFilter('win')">Windows (${cnt('win')})</button>
    <button class="filter-btn fb-web ${currentFilter==='web'?'on':''}" onclick="setFilter('web')">Web (${cnt('web')})</button>
    <button class="filter-btn fb-fav ${currentFilter==='fav'?'on':''}" onclick="setFilter('fav')">⭐ Favoris (${favs.size})</button>
  </div>
  <div class="level-bar">
    <button class="lbtn ${levelFilter==='all'?'on-unset':''}" onclick="setLevelFilter('all')"><span class="dot dot-unset"></span>Tous</button>
    <button class="lbtn ${levelFilter==='mastered'?'on-mastered':''}" onclick="setLevelFilter('mastered')"><span class="dot dot-mastered"></span>Maîtrisé (${lvCnt('mastered')})</button>
    <button class="lbtn ${levelFilter==='learning'?'on-learning':''}" onclick="setLevelFilter('learning')"><span class="dot dot-learning"></span>En cours (${lvCnt('learning')})</button>
    <button class="lbtn ${levelFilter==='unknown'?'on-unknown':''}" onclick="setLevelFilter('unknown')"><span class="dot dot-unknown"></span>À revoir (${lvCnt('unknown')})</button>
    <button class="lbtn ${levelFilter==='unset'?'on-unset':''}" onclick="setLevelFilter('unset')"><span class="dot dot-unset"></span>Non évalué (${all().filter(d=>getLevel(d.id)==='unset').length})</button>
  </div>
  ${searchQuery?`<div class="search-count">${cards.length} résultat${cards.length!==1?'s':''} pour « ${searchQuery} »</div>`:''}
  <div class="stitle">Cliquer pour retourner · point coloré pour évaluer · ☆ pour favoris</div>
  <div class="cards-grid">`;
  if(!cards.length){
    html+=`<div class="empty" style="grid-column:1/-1"><div class="empty-t">Aucune fiche</div><div class="empty-s">${searchQuery?`Aucun résultat pour « ${searchQuery} »`:'Modifiez les filtres'}</div></div>`;
  } else {
    cards.forEach(d=>{
      const lv=getLevel(d.id);
      html+=`<div class="card-wrap lv-${lv}${flipped.has(d.id)?' flipped':''}" id="cw-${d.id}" onclick="handleCardClick(event,${d.id})">
        <div class="card-inner">
          <div class="card-face card-front">
            <div class="cat-bar ${catBar(d.cat)}"></div>
            <div class="card-top">
              <div class="card-top-left">
                ${badge(d.cat)}
                <span class="lv-flag ${lv}" onclick="event.stopPropagation();togglePicker(event,${d.id})" title="Évaluer"></span>
              </div>
              <button class="star-btn" onclick="toggleFav(${d.id},event)" title="${favs.has(d.id)?'Retirer des favoris':'Ajouter aux favoris'}">${favs.has(d.id)?'⭐':'☆'}</button>
            </div>
            <div class="card-shortcut">${hl(d.shortcut)}</div>
            <div class="card-hint">${hl(d.hint)||'&nbsp;'}</div>
            <div class="card-flip-hint">retourner →</div>
          </div>
          <div class="card-face card-back">
            ${badge(d.cat)}
            <div class="card-back-action">${hl(d.action)}</div>
            <div class="card-back-short">${d.shortcut}</div>
          </div>
        </div>
      </div>`;
    });
  }
  html+='</div>';
  document.getElementById('tab-fiches').innerHTML=html;
  if(searchQuery){const inp=document.getElementById('search-input');if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);}}
  updateStats();
}

function onSearch(v){searchQuery=v;renderFiches();}
function clearSearch(){searchQuery='';renderFiches();}
function handleCardClick(e,id){if(activePicker){closePicker();return;}flipCard(id);}
function flipCard(id){if(flipped.has(id))flipped.delete(id);else flipped.add(id);renderFiches();}
function setFilter(f){currentFilter=f;renderFiches();}
function setLevelFilter(lf){levelFilter=lf;renderFiches();}

// ── PICKER ──
function isMobile(){return window.innerWidth<=640||('ontouchstart' in window);}
function togglePicker(e,id){
  e.stopPropagation();
  if(activePicker===id){closePicker();return;}
  closePicker();activePicker=id;
  if(isMobile()){openSheet(id);}
  else{
    const wrap=document.getElementById('cw-'+id);
    const tl=wrap.querySelector('.card-top-left');
    const picker=document.createElement('div');
    picker.className='lv-picker';picker.id='picker-'+id;
    [{lv:'mastered',label:'✓ Maîtrisé'},{lv:'learning',label:'~ En cours'},{lv:'unknown',label:'✗ À revoir'},{lv:'unset',label:'◌ Non évalué'}].forEach(o=>{
      const btn=document.createElement('button');btn.className='lv-picker-opt';
      btn.innerHTML=`<span class="dot ${LV_DOT[o.lv]}"></span>${o.label}`;
      btn.onclick=(ev)=>{ev.stopPropagation();setLevel(id,o.lv);closePicker();renderFiches();};
      picker.appendChild(btn);
    });
    tl.appendChild(picker);
    setTimeout(()=>document.addEventListener('click',closePicker,{once:true}),10);
  }
}
function openSheet(id){
  const cur=getLevel(id);
  const overlay=document.createElement('div');overlay.className='lv-sheet-overlay';overlay.id='lv-sheet-overlay';
  overlay.innerHTML=`<div class="lv-sheet">
    <div class="lv-sheet-handle"></div>
    <div class="lv-sheet-title">Évaluer ce raccourci</div>
    <div class="lv-sheet-opts">
      ${[{lv:'mastered',label:'✓ Maîtrisé',cls:'opt-mastered'},{lv:'learning',label:'~ En cours',cls:'opt-learning'},{lv:'unknown',label:'✗ À revoir',cls:'opt-unknown'},{lv:'unset',label:'◌ Non évalué',cls:''}].map(o=>`
      <button class="lv-sheet-opt ${o.cls}" onclick="pickSheet(${id},'${o.lv}')">
        <span class="dot ${LV_DOT[o.lv]}"></span>${o.label}${cur===o.lv?' ✓':''}
      </button>`).join('')}
    </div>
  </div>`;
  overlay.addEventListener('click',e=>{if(e.target===overlay)closePicker();});
  document.body.appendChild(overlay);
}
function pickSheet(id,lv){setLevel(id,lv);closePicker();renderFiches();}
function closePicker(){
  if(activePicker){
    const p=document.getElementById('picker-'+activePicker);if(p)p.remove();
    const o=document.getElementById('lv-sheet-overlay');if(o)o.remove();
    activePicker=null;
  }
}

// ── SLIDE ──
function slideFilterBar(){
  const cnt=f=>all().filter(c=>c.cat===f).length;
  return `<div class="filter-bar">
    <button class="filter-btn fb-all ${slideFilter==='all'?'on':''}" onclick="setSlideFilter('all')">Tous</button>
    <button class="filter-btn fb-excel ${slideFilter==='excel'?'on':''}" onclick="setSlideFilter('excel')">Excel (${cnt('excel')})</button>
    <button class="filter-btn fb-ppt ${slideFilter==='ppt'?'on':''}" onclick="setSlideFilter('ppt')">PowerPoint (${cnt('ppt')})</button>
    <button class="filter-btn fb-win ${slideFilter==='win'?'on':''}" onclick="setSlideFilter('win')">Windows (${cnt('win')})</button>
    <button class="filter-btn fb-web ${slideFilter==='web'?'on':''}" onclick="setSlideFilter('web')">Web (${cnt('web')})</button>
  </div>`;
}
function slideLevelBar(){
  return `<div class="level-bar">
    <button class="lbtn ${slideLevelFilter==='all'?'on-unset':''}" onclick="setSlideLevelFilter('all')"><span class="dot dot-unset"></span>Tous</button>
    <button class="lbtn ${slideLevelFilter==='mastered'?'on-mastered':''}" onclick="setSlideLevelFilter('mastered')"><span class="dot dot-mastered"></span>Maîtrisé</button>
    <button class="lbtn ${slideLevelFilter==='learning'?'on-learning':''}" onclick="setSlideLevelFilter('learning')"><span class="dot dot-learning"></span>En cours</button>
    <button class="lbtn ${slideLevelFilter==='unknown'?'on-unknown':''}" onclick="setSlideLevelFilter('unknown')"><span class="dot dot-unknown"></span>À revoir</button>
    <button class="lbtn ${slideLevelFilter==='unset'?'on-unset':''}" onclick="setSlideLevelFilter('unset')"><span class="dot dot-unset"></span>Non évalué</button>
  </div>`;
}
function renderSlide(){
  const cards=filteredCards(slideFilter,slideLevelFilter,'');
  const el=document.getElementById('tab-slide');
  if(!cards.length){el.innerHTML=slideFilterBar()+slideLevelBar()+`<div class="empty"><div class="empty-t">Aucune fiche</div><div class="empty-s">Modifiez les filtres</div></div>`;return;}
  const idx=Math.min(slideIdx,cards.length-1);
  const d=cards[idx];const lv=getLevel(d.id);
  const dots=cards.length<=20?cards.map((_,i)=>`<div class="sdot${i===idx?' on':''}" onclick="goSlide(${i})"></div>`).join(''):`<span class="slide-counter">${idx+1} / ${cards.length}</span>`;
  el.innerHTML=`${slideFilterBar()}${slideLevelBar()}
  <div class="stitle">Mode slide</div>
  <div style="max-width:640px;margin:0 auto">
    <div class="big-card${slideFlipped?' flipped':''}" onclick="toggleSlideFlip()">
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem">
          <div style="display:flex;align-items:center;gap:8px">
            ${badge(d.cat)}
            ${lv!=='unset'?`<span style="font-size:11px;padding:2px 8px;border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;background:var(--${lv}-bg);color:var(--${lv});border:1px solid var(--${lv}-border)">${LV_LABEL[lv]}</span>`:''}
          </div>
          <span style="font-size:12px;color:${slideFlipped?'rgba(245,240,232,0.5)':'var(--text4)'};font-family:'Plus Jakarta Sans',sans-serif">${idx+1} / ${cards.length}</span>
        </div>
        <div class="cat-bar ${catBar(d.cat)}" style="margin-top:10px"></div>
      </div>
      ${!slideFlipped
        ?`<div class="flip-zone"><div class="big-shortcut">${d.shortcut}</div>${d.hint?`<div class="big-hint">${d.hint}</div>`:''}<div class="flip-tip">Entrée ou clic pour voir l'action →</div></div>`
        :`<div class="flip-zone"><div class="big-action">${d.action}</div><div class="big-sub">${d.shortcut}</div><div class="flip-tip-inv">Entrée ou clic pour retourner ←</div></div>`
      }
    </div>
    <div class="slide-nav" style="justify-content:center">
      <button class="snav-btn" onclick="prevSlide()" ${idx===0?'disabled':''}>← Précédent</button>
      <div class="slide-dots">${dots}</div>
      <button class="snav-btn" onclick="nextSlide()" ${idx===cards.length-1?'disabled':''}>Suivant →</button>
    </div>
    <div class="swipe-hint"><span>←</span> Glissez pour naviguer <span>→</span></div>
    <div class="slide-level-row">
      <button class="slbtn${lv==='mastered'?' active-mastered':''}" onclick="setSlideLv('mastered')"><span class="dot dot-mastered"></span>Maîtrisé</button>
      <button class="slbtn${lv==='learning'?' active-learning':''}" onclick="setSlideLv('learning')"><span class="dot dot-learning"></span>En cours</button>
      <button class="slbtn${lv==='unknown'?' active-unknown':''}" onclick="setSlideLv('unknown')"><span class="dot dot-unknown"></span>À revoir</button>
    </div>
    <div class="kbd-hint">
      <span><span class="kbd">←</span> Précédent</span>
      <span><span class="kbd">Entrée</span> Retourner</span>
      <span><span class="kbd">→</span> Suivant</span>
      <span><span class="kbd">1/2/3</span> Évaluer</span>
    </div>
  </div>`;
  let tx=0;
  const bc=el.querySelector('.big-card');
  let ty=0;let swiping=false;
  bc.addEventListener('touchstart',e=>{
    tx=e.touches[0].clientX;ty=e.touches[0].clientY;swiping=false;
  },{passive:true});
  bc.addEventListener('touchmove',e=>{
    const dx=Math.abs(e.touches[0].clientX-tx);
    const dy=Math.abs(e.touches[0].clientY-ty);
    if(dx>dy&&dx>10){swiping=true;e.preventDefault();}
  },{passive:false});
  bc.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-tx;
    const dy=e.changedTouches[0].clientY-ty;
    if(swiping&&Math.abs(dx)>40){
      if(dx<0)nextSlide();else prevSlide();
    } else if(!swiping&&Math.abs(dy)<20&&Math.abs(dx)<20){
      toggleSlideFlip();
    }
  },{passive:true});
}
function setSlideLv(lv){const cards=filteredCards(slideFilter,slideLevelFilter,'');if(!cards.length)return;const d=cards[Math.min(slideIdx,cards.length-1)];const cur=getLevel(d.id);setLevel(d.id,cur===lv?'unset':lv);renderSlide();}
function goSlide(i){slideIdx=i;slideFlipped=false;renderSlide();}
function prevSlide(){if(slideIdx>0){slideIdx--;slideFlipped=false;renderSlide();}}
function nextSlide(){const cards=filteredCards(slideFilter,slideLevelFilter,'');if(slideIdx<cards.length-1){slideIdx++;slideFlipped=false;renderSlide();}}
function toggleSlideFlip(){slideFlipped=!slideFlipped;renderSlide();}
function setSlideFilter(f){slideFilter=f;slideIdx=0;slideFlipped=false;renderSlide();}
function setSlideLevelFilter(lf){slideLevelFilter=lf;slideIdx=0;slideFlipped=false;renderSlide();}

document.addEventListener('keydown',e=>{
  const sv=document.getElementById('tab-slide').style.display!=='none';
  if(!sv)return;
  if(e.key==='Enter'||e.key===' '){e.preventDefault();toggleSlideFlip();}
  if(e.key==='ArrowRight'){e.preventDefault();nextSlide();}
  if(e.key==='ArrowLeft'){e.preventDefault();prevSlide();}
  if(e.key==='1')setSlideLv('mastered');
  if(e.key==='2')setSlideLv('learning');
  if(e.key==='3')setSlideLv('unknown');
});

// ── QUIZ ──
function renderQuizModeSelect(){
  const nUnknown=all().filter(d=>getLevel(d.id)==='unknown').length;
  document.getElementById('tab-quiz').innerHTML=`
  <div class="stitle">Choisir le mode de quiz</div>
  <div class="quiz-mode-sel">
    <div class="qmode-btn${quizMode==='shortcut'?' selected':''}" onclick="selectQMode('shortcut')">
      <div class="qmode-title">Raccourci → Action</div>
      <div class="qmode-sub">On vous montre le raccourci, trouvez ce qu'il fait</div>
    </div>
    <div class="qmode-btn${quizMode==='action'?' selected':''}" onclick="selectQMode('action')">
      <div class="qmode-title">Action → Raccourci</div>
      <div class="qmode-sub">On vous décrit l'action, trouvez le raccourci</div>
    </div>
    <div class="qmode-btn${quizMode==='mixed'?' selected':''}" onclick="selectQMode('mixed')">
      <div class="qmode-title">Mode mixte</div>
      <div class="qmode-sub">Les deux sens mélangés aléatoirement</div>
    </div>
    <div class="qmode-btn${quizMode==='sr'?' selected':''}" onclick="selectQMode('sr')">
      <div class="qmode-title">🧠 Répétition espacée</div>
      <div class="qmode-sub">Les raccourcis à revoir reviennent plus souvent — comme Anki${nUnknown>0?` · ${nUnknown} à revoir`:''}</div>
    </div>
  </div>
  <button class="btn primary" onclick="startQuiz()">Lancer le quiz →</button>`;
}
function selectQMode(m){quizMode=m;renderQuizModeSelect();}

function startQuiz(){
  let pool;
  if(quizMode==='sr'){
    // Spaced repetition: weight by level + past errors
    const weighted=[];
    all().forEach(d=>{
      const lv=getLevel(d.id);
      const w={unknown:5,learning:2,unset:1,mastered:0.3}[lv]||1;
      const extra=Math.min(srWrong[d.id]||0,4);
      const total=Math.ceil(w+extra);
      for(let i=0;i<total;i++)weighted.push(d);
    });
    const shuffled=shuffle(weighted);
    // deduplicate
    const seen=new Set();
    pool=shuffled.filter(d=>{if(seen.has(d.id))return false;seen.add(d.id);return true;}).slice(0,12);
  } else if(quizMode==='unknown'){
    pool=all().filter(d=>getLevel(d.id)==='unknown');
  } else {
    pool=shuffle(all()).slice(0,12);
  }
  if(pool.length<4){showToast('Pas assez de fiches pour ce mode','err');return;}
  quizResults=[];
  const mode=['shortcut','action'].includes(quizMode)?quizMode:'mixed';
  quizState={questions:pool,idx:0,answered:false,chosen:null,mode,isSR:quizMode==='sr'};
  renderQuiz();
}

function getQType(i,mode){if(mode==='shortcut')return'shortcut';if(mode==='action')return'action';return i%2===0?'shortcut':'action';}

function renderQuiz(){
  const el=document.getElementById('tab-quiz');
  if(!quizState){renderQuizModeSelect();return;}
  const{questions,idx,answered,chosen,mode,isSR}=quizState;
  if(idx>=questions.length){
    const score=quizResults.filter(r=>r).length;
    const pct=Math.round(score/quizResults.length*100);
    if(pct>bestScore){bestScore=pct;localStorage.setItem('ma_best',String(bestScore));}
    if(pct===100)setTimeout(()=>launchConfetti(120),300);
    const msg=pct>=80?'Excellent ! Maîtrise confirmée. 🎯':pct>=60?'Très bien ! Continuez.':pct>=40?'Pas mal ! Encore un effort.':'Continuez, vous progressez !';
    const nRight=quizResults.filter(r=>r).length;
    const nWrong=quizResults.length-nRight;
    el.innerHTML=`<div class="score-box">
      <div class="score-ring"><div class="score-n">${score}/${quizResults.length}</div><div class="score-d">réponses</div></div>
      <div class="score-pct">${pct}%</div>
      <div class="score-breakdown">
        <div class="score-bd-item ok">✓ ${nRight} correcte${nRight>1?'s':''}</div>
        <div class="score-bd-item ko">✗ ${nWrong} erreur${nWrong>1?'s':''}</div>
      </div>
      <div class="score-msg">${msg}</div>
      <div class="brow" style="justify-content:center">
        <button class="btn primary" onclick="startQuiz()">Rejouer</button>
        <button class="btn" onclick="renderQuizModeSelect()">Changer de mode</button>
        <button class="btn" onclick="showTab('fiches')">Voir les fiches</button>
      </div>
    </div>`;
    return;
  }
  const q=questions[idx];const total=questions.length;
  const pct=Math.round(idx/total*100);
  const type=getQType(idx,mode);
  const decoys=shuffle(all().filter(d=>d.id!==q.id)).slice(0,3);
  const opts=shuffle([q,...decoys]);
  const lv=getLevel(q.id);
  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.875rem">
    <span style="font-size:12px;color:var(--text3);font-weight:600;font-family:'Plus Jakarta Sans',sans-serif">Question ${idx+1} / ${total}</span>
    <div style="display:flex;align-items:center;gap:6px">
      ${badge(q.cat)}
      ${isSR&&lv!=='unset'?`<span style="font-size:10px;padding:2px 7px;border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;background:var(--${lv}-bg);color:var(--${lv});border:1px solid var(--${lv}-border)">${LV_LABEL[lv]}</span>`:''}
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  <div class="quiz-box">
    <div class="quiz-q">${type==='shortcut'?`À quoi correspond ce raccourci ?<br><code>${q.shortcut}</code>`:`Quel raccourci permet de :<br><span style="color:var(--text3);font-weight:400;font-size:14px;font-style:italic;font-family:'Plus Jakarta Sans',sans-serif">${q.action}</span>`}</div>
    <div class="quiz-opts">`;
  opts.forEach(o=>{
    const label=type==='shortcut'?o.action:o.shortcut;
    let cls='';if(answered){if(o.id===q.id)cls='correct';else if(o.id===chosen)cls='wrong';}
    html+=`<button class="qopt ${cls}" ${answered?'disabled':''} onclick="answerQuiz(${o.id},${q.id})">${label}</button>`;
  });
  html+='</div>';
  if(answered){
    const ok=chosen===q.id;
    html+=`<div class="feedback ${ok?'ok':'ko'}">${ok?'✓ Correct !':'✗ Pas tout à fait.'} <strong>${q.shortcut}</strong> → ${q.action}</div>
    <div style="margin-top:1rem"><button class="btn primary" onclick="nextQ()">Suivant →</button></div>`;
  }
  html+='</div>';
  el.innerHTML=html;
}

function answerQuiz(chosen,correct){
  const ok=chosen===correct;
  quizResults.push(ok);
  quizState.answered=true;quizState.chosen=chosen;
  // Update spaced repetition score
  if(!ok){
    srWrong[correct]=(srWrong[correct]||0)+1;
    saveSR();
  } else {
    // Correct answer: reduce error count slightly
    if(srWrong[correct]>0){srWrong[correct]=Math.max(0,srWrong[correct]-1);saveSR();}
  }
  // Auto-update level
  if(ok&&getLevel(correct)==='unknown'){setLevel(correct,'learning');}
  if(!ok&&getLevel(correct)==='mastered'){setLevel(correct,'learning');}
  renderQuiz();
}
function nextQ(){quizState.idx++;quizState.answered=false;quizState.chosen=null;renderQuiz();}

function shuffle(arr){return[...arr].sort(()=>Math.random()-.5);}
function showToast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast show ${type}`;
  setTimeout(()=>{t.className='toast';},2500);
}

updateStats();
renderFiches();
</script>
<!-- PWA Service Worker -->
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').then(reg=>{
      // Vérifie les mises à jour toutes les 60 secondes
      setInterval(()=>reg.update(), 60000);
      // Nouvelle version détectée → recharge automatiquement
      reg.addEventListener('updatefound',()=>{
        const newSW=reg.installing;
        newSW.addEventListener('statechange',()=>{
          if(newSW.state==='installed'&&navigator.serviceWorker.controller){
            newSW.postMessage('skipWaiting');
            window.location.reload();
          }
        });
      });
    });
    // Recharge quand le SW prend le contrôle
    navigator.serviceWorker.addEventListener('controllerchange',()=>{
      window.location.reload();
    });
  });
}
</script>
